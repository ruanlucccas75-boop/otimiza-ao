<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimizer — Windows Optimization Suite</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Se qualquer script travar antes do React montar (ex: erro de
      // carregamento de modulo, dependencia quebrada no bundle), isso
      // mostra o erro na tela em vez de deixar tudo branco e mudo.
      window.addEventListener('error', function (e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML =
            '<div style="font-family:sans-serif;background:#0a0c12;color:#fca5a5;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">' +
            '<h2 style="color:#fff;margin-bottom:8px;">Erro ao carregar o Optimizer</h2>' +
            '<pre style="max-width:700px;white-space:pre-wrap;font-size:12px;color:#f87171;background:#13161e;padding:12px;border-radius:8px;">' +
            (e.message || e) + '</pre></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
